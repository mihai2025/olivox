<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 540" fill="none">
  <!-- Phone body shadow -->
  <rect x="48" y="12" width="204" height="516" rx="32" fill="#00000015"/>
  <!-- Phone body -->
  <rect x="44" y="8" width="204" height="516" rx="32" fill="#1a1a2e" stroke="#2a2a4e" stroke-width="2"/>
  <!-- Screen area (transparent for overlay) -->
  <rect x="56" y="52" width="180" height="428" rx="4" fill="white" fill-opacity="0.05"/>
  <!-- Top notch -->
  <rect x="112" y="20" width="68" height="6" rx="3" fill="#2a2a4e"/>
  <!-- Camera dot -->
  <circle cx="146" cy="23" r="4" fill="#2a2a4e" stroke="#3a3a5e" stroke-width="1"/>
  <!-- Home indicator -->
  <rect x="118" y="500" width="56" height="4" rx="2" fill="#2a2a4e"/>
  <!-- Side button right -->
  <rect x="248" y="120" width="3" height="40" rx="1.5" fill="#2a2a4e"/>
  <!-- Volume buttons left -->
  <rect x="41" y="100" width="3" height="30" rx="1.5" fill="#2a2a4e"/>
  <rect x="41" y="140" width="3" height="30" rx="1.5" fill="#2a2a4e"/>
</svg>
